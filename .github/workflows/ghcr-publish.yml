name: GHCR Publish (fork)

# Fork-only: publishes ghcr.io/mchristoffers/hermes-agent so HermesForClient
# can build on it. Gated to this fork so it never runs on upstream NousResearch
# (whose own docker-publish.yml is gated the opposite way).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    if: github.repository == 'mchristoffers/hermes-agent'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            HERMES_GIT_SHA=${{ github.sha }}
          tags: |
            ghcr.io/mchristoffers/hermes-agent:latest
            ghcr.io/mchristoffers/hermes-agent:${{ github.sha }}
