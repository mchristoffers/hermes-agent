# Upstream sync — owned by this fork, like build-image.yml intentionally
# decoupled from upstream files so the merge below never conflicts with it.
#
# Manual only: triggered by `make update` in the deploy repo (or Actions tab).
# Merges NousResearch/hermes-agent main into this fork's main and pushes.
# Already up to date -> green no-op. Merge conflict -> fails loudly with the
# conflicting files listed; resolve by hand (fork-owned files don't exist
# upstream, so this should practically never happen).
#
# .github/workflows/ is FROZEN at fork state: GITHUB_TOKEN can never push
# workflow changes (no grantable `workflows` permission), so the merge
# restores that dir and amends. Upstream CI workflow changes are deliberately
# not taken — want one? Copy it over manually.
name: Sync upstream

on:
  workflow_dispatch:

concurrency:
  group: sync-upstream
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork (full history for merge)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Merge upstream/main and push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add upstream https://github.com/NousResearch/hermes-agent.git
          git fetch upstream main

          before=$(git rev-parse HEAD)
          if ! git merge --no-edit upstream/main; then
            echo "::error::Merge conflict with upstream/main — resolve manually:"
            git diff --name-only --diff-filter=U
            exit 1
          fi

          if [ "$(git rev-parse HEAD)" = "$before" ]; then
            echo "Already up to date with upstream/main." | tee -a "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Keep fork workflows frozen (see header). restore removes files
          # absent from --source, so upstream-new workflows are dropped too.
          if ! git diff --quiet "$before" HEAD -- .github/workflows; then
            git restore --source="$before" --staged --worktree -- .github/workflows
            git commit --amend --no-edit
            echo "Skipped upstream .github/workflows changes (frozen at fork state)." \
              | tee -a "$GITHUB_STEP_SUMMARY"
          fi

          git push origin HEAD:main
          count=$(git rev-list --count "$before..upstream/main")
          {
            echo "### Synced upstream"
            echo ""
            echo "Merged $count upstream commits."
            echo "New HEAD: \`$(git rev-parse --short=12 HEAD)\`"
          } >> "$GITHUB_STEP_SUMMARY"
