# Isolated deploy-image build — owned by this fork, intentionally decoupled
# from upstream's docker-publish.yml so `git merge upstream/main` never
# touches or conflicts with it.
#
# Manual only: Actions tab -> "Build deploy image" -> Run workflow.
# Builds the chosen ref and pushes to GHCR. The deploy repo
# (mchristoffers/hermes) then pulls the resulting tag — it never builds.
#
# Single-arch linux/amd64: the deploy box is x86_64, so we skip the slow
# QEMU arm64 emulation that the multi-arch docker-publish.yml pays for.
name: Build deploy image

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch / tag / SHA to build"
        required: true
        default: main

concurrency:
  group: build-deploy-image
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/hermes-agent

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      # Derive both shas from the CHECKED-OUT ref, not github.sha (which is the
      # workflow file's ref, i.e. the default branch — wrong for tag/sha builds).
      - name: Resolve sha
        id: meta
        run: |
          echo "short=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"
          echo "full=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            HERMES_GIT_SHA=${{ steps.meta.outputs.full }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.meta.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Summary
        run: |
          {
            echo "### Pushed image"
            echo ""
            echo '```'
            echo "${{ env.IMAGE }}:latest"
            echo "${{ env.IMAGE }}:${{ steps.meta.outputs.short }}"
            echo '```'
            echo ""
            echo "Deploy with tag: \`${{ steps.meta.outputs.short }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
